{% extends "layout.html" %}

{% block body %}   
    <img src="https://images.unsplash.com/photo-1647965613975-01be81471670?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OTJ8fHZpb2xpbiUyMHN0cmluZ3N8ZW58MHwwfDB8fHwy" alt="Violins on display" class="w3-image">    
    <h1 class="home-product-header">Accessories</h1>
    <div class="three-column">
        {% for product in results %}        
            <div class="w3-card-4 ">
                <a href="{{ url_for('home', id=product[0]) }}" class="product_name"> 
                    <h1 class="product_name">{{ product[1] }}</h1>
                    <img src="{{ product[2] }}" alt="{{ product[1] }}" >
                </a>
                <a href="#" class="cart-link"><button class="w3-button w3-block w3-theme">Add to Cart</button></a>           
            </div>
        

        {% endfor %}
    </div>  

{% endblock %}
