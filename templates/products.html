{% extends "layout.html" %}

{% block body %}
<div class="three-column">
    {% for product in results %}
    <a href="{{ url_for('product', id=product[0]) }}">
        <div class="w3-card-4">
            <h1>{{ product[0] }}</h1>
            <img src="{{ product[4] }}" alt="{{ product[0] }}">
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
