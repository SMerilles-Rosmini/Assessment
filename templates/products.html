{% extends "layout.html" %}

{% block body %}
<div class="three-column">
    {% for product in results %}
    <a href="{{ url_for('products', id=product[0]) }}" class="product_name"> 
        <div class="w3-card-4">
            <h1 class="product_name">{{ product[1] }}</h1>
            <img src="{{ product[2] }}" alt="{{ product[1] }}" >            
        </div>
    </a>
    {% endfor %}
</div>
{% endblock %}
