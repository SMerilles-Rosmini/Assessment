{% extends "layout.html" %}
<!-- Products page -->
{% block body %}
<h1 class="product-header">All Products</h1>
<div class="w3-dropdown-hover">
    <button class="w3-button cart-button w3-round-xxlarge w3-theme ">Filter</button>
    <div class="w3-dropdown-content w3-bar-block w3-card-4 filter_content">
        <a href="#" class="w3-bar-item w3-button button">Price (Low to High)</a>
    </div>
          
</div>
<div class="three-column">        
    {% for product in results %}
        <a href="{{ url_for('individ_products', id=product[0])}}" class="product_name">             
            <div class="w3-card-4">
                    
                    <h1 class="product_name">{{ product[1] }}</h1>
                    <div class="image-container">
                        <img src="{{ product[2] }}" alt="{{ product[1] }}" >
                    </div>
                    <h2>${{ product[3] }}</h2>                
            </div>
        </a>
    {% endfor %}
</div>
{% endblock %}
